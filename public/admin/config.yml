backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: /
display_url: /

collections:
  - name: conversations
    label: Conversations
    label_singular: Conversation
    folder: content/conversations
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    summary: "{{fields.date}} - {{fields.title}}"
    fields:
      - label: Slug
        name: slug
        widget: string
        required: false
        hint: "Optional. If empty, the app derives a slug from filename/title."
      - label: Date
        name: date
        widget: string
        required: false
        hint: "Optional. Derived from filename prefix YYYY-MM-DD when omitted."
      - label: Title
        name: title
        widget: string
        required: false
        hint: "Optional. Derived from filename segment after YYYY-MM-DD__."
      - label: Tags
        name: tags
        widget: list
        required: false
        allow_add: true
        collapsed: false
        summary: "{{fields}}"
      - label: Model
        name: model
        widget: string
        required: false
      - label: Topic
        name: topic
        widget: string
        required: false
      - label: Image
        name: image
        widget: object
        fields:
          - label: Source
            name: src
            widget: image
            choose_url: false
            media_library:
              config:
                multiple: false
          - label: Prompt Crop
            name: promptCrop
            widget: object
            fields:
              - label: X
                name: x
                widget: number
                value_type: float
                min: 0
                max: 1
                step: 0.01
                default: 0.06
              - label: Y
                name: y
                widget: number
                value_type: float
                min: 0
                max: 1
                step: 0.01
                default: 0.58
              - label: Width
                name: w
                widget: number
                value_type: float
                min: 0.05
                max: 1
                step: 0.01
                default: 0.88
              - label: Height
                name: h
                widget: number
                value_type: float
                min: 0.05
                max: 1
                step: 0.01
                default: 0.22
